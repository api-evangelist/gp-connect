description: >
  GP Connect is a publicly funded NHS England national interoperability
  programme. There is no direct API-call cost to consuming organisations;
  the infrastructure is funded by NHS England centrally. FinOps considerations
  for NHS organisations adopting GP Connect are therefore primarily indirect:
  integration engineering costs, clinical safety officer time, information
  governance review, and HSCN connectivity charges (for clinical system APIs).
  Patient-facing APIs require NHS login integration, which may have associated
  NHS login programme costs.
sources:
  - https://digital.nhs.uk/services/gp-connect
  - https://digital.nhs.uk/services/health-and-social-care-network
